
<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Announcements</title>

</head>

<body style="font-family:Arial;">

<h1 style="text-align:center;">
📢 Announcements
</h1>

<div id="announcements" style="padding:15px;">

Loading announcements...

</div>


<script>

fetch("https://opensheet.elk.sh/1b7bf0B0idhG2SJymtebBdZIkHuCbhOmYbeoUukcMxZI/Sheet1")
.then(res => res.json())
.then(data => {

let output = "";

data.forEach(row => {

output += `
<div style="
background:#f4f4f4;
margin:10px;
padding:15px;
border-radius:10px;
">

<b>${row.Announcement || ""}</b><br><br>

${row.Description || row.Details || ""}

</div>
`;

});

document.getElementById("announcements").innerHTML = output;

});

</script>

</body>

</html>
