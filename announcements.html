
<!DOCTYPE html>
<html>

<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Announcements</title>

</head>

<body style="font-family:Arial;">

<h1 style="text-align:center;">
📢 Announcements
</h1>

<div id="announcements" style="padding:15px;">

Loading announcements...

</div>


<script>

fetch("https://opensheet.elk.sh/1b7bf0B0idhG2SJymtebBdZIkHuCbhOmYbeoUukcMxZI/Sheet1")
.then(response => response.json())
.then(data => {

let html = "";

data.forEach(function(row){

html += `
<div style="
background:#f4f4f4;
margin-bottom:15px;
padding:15px;
border-radius:10px;
">

<b>${row.Announcement}</b><br><br>

${row.Details || ""}

</div>
`;

});

document.getElementById("announcements").innerHTML = html;

})
.catch(error => {

document.getElementById("announcements").innerHTML =
"Error loading announcements";

console.log(error);

});

</script>

</body>

</html>
