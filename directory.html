<!DOCTYPE html>
<html>

<head>

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Member Directory</title>

<style>

body{
font-family:Arial;
text-align:center;
background:#f4f4f4;
}

.card{
background:white;
margin:20px;
padding:20px;
border-radius:10px;
box-shadow:0px 2px 5px gray;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
}

td, th{
padding:10px;
border-bottom:1px solid #ddd;
}

</style>

<script>

var password;

password = prompt("Enter Church Password:");

if(password != "zionhill123")
{
window.location="index.html";
}

async function loadDirectory() {

const response = await fetch(
"https://docs.google.com/spreadsheets/d/1FGwDjUXSFGV7kQ9Z_CkN8LvTK43APOKsqs5Gwy6rh6k/export?format=csv"
);

const data = await response.text();

const rows = data.split("\n");

let html = "<table>";

rows.forEach(function(row){

let cols = row.split(",");

html += "<tr>";

cols.forEach(function(col){

html += "<td>"+col+"</td>";

});

html += "</tr>";

});

html += "</table>";

document.getElementById("directory").innerHTML = html;

}

</script>

</head>

<body onload="loadDirectory()">

<h1>Member Directory</h1>

<div class="card">

<div id="directory">
Loading directory...
</div>

</div>


<br>

<a href="index.html">

<button>Back Home</button>

</a>

</body>

</html>
